name: Nofelet-backend pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  APP_INFRA: ${{ vars.INFRA }}

jobs:
  Test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Running tests (stub)
        run: |
          echo "Тесты скоро будут здесь!"
          echo "В данный момент это заглушка, пайплайн продолжает работу."
          exit 0 # Явно говорим, что все прошло успешно

  Lint:
    name: Linting
    runs-on: ubuntu-latest
    needs: Test
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify dependencies
        run: |
          go mod download
          go mod tidy
          go build ./...

      - name: Debug envconfig
        run: |
          go list -m github.com/sethvargo/go-envconfig
          go doc github.com/sethvargo/go-envconfig || true

      - name: Debug golangci config
        run: |
          pwd
          ls -la
          echo "===== .golangci.yml ====="
          cat .golangci.yml

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          args: --config=.golangci.yml ./...

  Build-and-push:
    runs-on: ubuntu-latest
    needs: [Test, Lint]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Этот шаг берет "MaximTretjakov/nofelet" и делает из него "maximtretjakov/nofelet"
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. А здесь мы говорим: "Используй теги, которые подготовил шаг meta"
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # ВАЖНО: используем вывод шага meta, а не IMAGE_NAME
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  Deploy:
    runs-on: ubuntu-latest
    needs: Build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd ${{ env.APP_INFRA }}
            # Авторизуемся в реестре на VPS
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
            # Тянем обновленный образ
            docker compose pull nofelet-signaling
            # Запускаем всё. Docker сам поймет, если в docker-compose.yml изменились лимиты, 
            # пробросы портов или вольюмы, и пересоздаст нужные контейнеры.
            docker compose up -d nofelet-signaling
            # Чистим старые образы
            docker image prune -f